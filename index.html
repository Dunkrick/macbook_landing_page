<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>One Machine</title>
  <meta name="description"
    content="A personal love letter to the MacBook Pro M3 Pro. How I found it, why I chose it, and how it handles everything I throw at it — from 4K edits to full-stack dev." />

  <!-- Open Graph -->
  <meta property="og:title" content="Rithwick × MacBook Pro M3 Pro" />
  <meta property="og:description"
    content="The story of how I found the perfect machine — and what a day on it actually looks like." />
  <meta property="og:type" content="website" />

  <!-- Google Fonts — Suburbia Style (Anton, DM Mono, Permanent Marker) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Mono:wght@300;400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Grungy Rough-Edge SVG Filter for Borders -->
  <svg style="position: absolute; width: 0; height: 0;" xmlns="http://www.w3.org/2000/svg">
    <filter id="rough-edge">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
</body>

</html>
