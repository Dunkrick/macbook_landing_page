<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .ascii { font-family: 'Courier New', monospace; font-size: 14px; fill: #ff3b00; font-weight: bold; white-space: pre; }
    .bg { fill: #050505; }
  </style>
  <rect width="100" height="100" class="bg" rx="15" />
  
  <filter id="grunge">
    <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
  </filter>

  <g filter="url(#grunge)" transform="translate(0, 5)">
    <text x="50" y="35" text-anchor="middle" class="ascii">.----------.</text>
    <text x="50" y="55" text-anchor="middle" class="ascii">|   [M3]   |</text>
    <text x="50" y="75" text-anchor="middle" class="ascii">\==========/</text>
  </g>
</svg>