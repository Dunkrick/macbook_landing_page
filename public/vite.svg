<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Grungy filter for wobbly, hand-drawn edges -->
  <filter id="grunge">
    <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="3" result="noise" />
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
  </filter>

  <!-- Solid background block to give it weight -->
  <rect width="100" height="100" fill="#050505" rx="15" />
  
  <g filter="url(#grunge)">
    <!-- Laptop Top/Screen -->
    <rect x="20" y="30" width="60" height="38" rx="4" fill="#ff3b00" />
    <!-- Inner Screen Cutout -->
    <rect x="26" y="36" width="48" height="26" rx="2" fill="#050505" />
    
    <!-- Laptop Base/Keyboard Deck -->
    <path d="M10,72 L90,72 L85,82 L15,82 Z" fill="#ff3b00" />
    <!-- Trackpad Cutout -->
    <rect x="42" y="74" width="16" height="5" fill="#050505" />
  </g>
</svg>